<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Zeta Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #111122, #000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 90px;
      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #00ffcc, #ff00ff);
      animation: rotateBg 15s linear infinite;
      opacity: 0.08;
      z-index: -1;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .banner {
      position: fixed;
      top: 0;
      width: 100%;
      height: 65px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 900;
      color: #000;
      text-shadow: 0 0 15px #fff;
      letter-spacing: 2px;
    }

    .container {
      background: rgba(10, 10, 25, 0.95);
      padding: 35px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      border: 2px solid #00ffff;
      box-shadow: 0 0 25px #ff00ff, 0 0 60px #00ffff;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffff;
    }

    label {
      font-size: 14px;
      color: #ff00ff;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111133;
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border: 2px solid #00ffff;
      box-shadow: 0 0 12px #00ffff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
      transition: 0.3s;
      animation: pulse 2s infinite;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff; }
      50% { box-shadow: 0 0 25px #ff00ff, 0 0 45px #00ffff; }
      100% { box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff; }
    }

    button:hover {
      transform: scale(1.05);
    }

    .terms-container {
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
    }

    .terms-container input {
      width: 18px;
      height: 18px;
      accent-color: #00ffff;
      cursor: pointer;
    }

    .terms-container a {
      color: #00ffff;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s;
    }

    .terms-container a:hover {
      color: #ff00ff;
      text-shadow: 0 0 8px #ff00ff;
    }

    .message {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      min-height: 25px;
    }

    .success {
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
    }

    .error {
      color: #ff4d4d;
      text-shadow: 0 0 10px #ff4d4d;
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    .link a {
      color: #ff00ff;
      text-decoration: none;
      font-weight: bold;
    }

    .link a:hover {
      color: #00ffff;
    }
  </style>
</head>

<body>

<div class="banner">ZETA STORE</div>

<div class="container">
  <h2>Crear Cuenta</h2>

  <form id="registerForm">
    <label>Nombre de Usuario</label>
    <input type="text" id="username" required>

    <label>Correo Electrónico</label>
    <input type="email" id="email" required>

    <label>WhatsApp</label>
    <select id="countryCode">
      <option value="+49">Alemania +49</option>
      <option value="+54">Argentina +54</option>
      <option value="+591">Bolivia +591</option>
      <option value="+55">Brasil +55</option>
      <option value="+1">Canadá +1</option>
      <option value="+56">Chile +56</option>
      <option value="+82">Corea del Sur +82</option>
      <option value="+506">Costa Rica +506</option>
      <option value="+593">Ecuador +593</option>
      <option value="+503">El Salvador +503</option>
      <option value="+971">Emiratos Árabes Unidos +971</option>
      <option value="+34">España +34</option>
      <option value="+33">Francia +33</option>
      <option value="+502">Guatemala +502</option>
      <option value="+57">Colombia +57</option>
      <option value="+504">Honduras +504</option>
      <option value="+91">India +91</option>
      <option value="+39">Italia +39</option>
      <option value="+81">Japón +81</option>
      <option value="+52">México +52</option>
      <option value="+505">Nicaragua +505</option>
      <option value="+507">Panamá +507</option>
      <option value="+595">Paraguay +595</option>
      <option value="+51">Perú +51</option>
      <option value="+44">Reino Unido +44</option>
      <option value="+1">Estados Unidos +1</option>
      <option value="+598">Uruguay +598</option>
      <option value="+58">Venezuela +58</option>
    </select>

    <input type="tel" id="phone" required>

    <label>Contraseña</label>
    <input type="password" id="password" required>

    <label>Confirmar Contraseña</label>
    <input type="password" id="confirmPassword" required>

    <div class="terms-container">
      <input type="checkbox" id="termsCheckbox" required>
      <span>
        Acepto los 
        <a href="#">Términos y Condiciones</a> 
        y la 
        <a href="#">Política de Privacidad</a>
      </span>
    </div>

    <button type="submit" id="submitBtn">Crear Cuenta</button>
    <p id="errorMsg" class="message"></p>
  </form>

  <div class="link">
    ¿Ya tienes cuenta? <a href="/">Inicia sesión</a>
  </div>
</div>

<script type="module">
import { auth, db } from "./firebase.js";
import { createUserWithEmailAndPassword, sendEmailVerification, deleteUser } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

const form = document.getElementById('registerForm');
const errorMsg = document.getElementById('errorMsg');
const submitBtn = document.getElementById('submitBtn');

/* 🔥 DETECCIÓN AUTOMÁTICA DE PAÍS */
fetch("https://ipapi.co/json/")
.then(res => res.json())
.then(data => {
  const countryCode = data.country_calling_code;
  if(countryCode){
    document.getElementById("countryCode").value = countryCode;
  }
}).catch(()=>{});

/* 🔥 TU LÓGICA ORIGINAL */
form.addEventListener('submit', async (e) => {
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.textContent = "Procesando...";

  const username = document.getElementById('username').value.trim().toLowerCase();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const countryCode = document.getElementById('countryCode').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;

  if (password !== confirmPassword) return showError("⚔️ Las contraseñas no coinciden.");
  if (password.length < 6) return showError("🔐 La contraseña debe tener mínimo 6 caracteres.");
  if (username.length < 3) return showError("👤 El usuario debe tener al menos 3 caracteres.");

  try {
    const usernameRef = doc(db, "usernames", username);
    const usernameSnap = await getDoc(usernameRef);

    if (usernameSnap.exists()) return showError("⚡ Ese nombre de usuario ya está en uso.");

    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    await setDoc(usernameRef, { uid: user.uid });
    await setDoc(doc(db, "usuarios", user.uid), {
      username,
      email,
      phone: countryCode + phone,
      createdAt: new Date(),
      role: "user"
    });

    await sendEmailVerification(user);

    errorMsg.textContent = "📧 Revisa tu correo para verificar tu cuenta.";
    errorMsg.className = "message success";

    setTimeout(() => { window.location.href = "/"; }, 3000);

  } catch (error) {
    showError(error.message);
  }
});

function showError(message) {
  errorMsg.textContent = message;
  errorMsg.className = "message error";
  submitBtn.disabled = false;
  submitBtn.textContent = "Crear Cuenta";
}
</script>

</body>
</html>
