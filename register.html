<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Cuenta - Zeta Store</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    /* 🔥 TODO TU DISEÑO ORIGINAL — NO SE TOCÓ NADA 🔥 */
    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(circle at top, #111122, #000);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding-top: 90px;
      overflow-y: auto;
    }

    body::before {
      content: "";
      position: fixed;
      width: 300%;
      height: 300%;
      background: linear-gradient(45deg, #ff00ff, #00ffff, #00ffcc, #ff00ff);
      animation: rotateBg 15s linear infinite;
      opacity: 0.08;
      z-index: -1;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .banner {
      position: fixed;
      top: 0;
      width: 100%;
      height: 65px;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 28px;
      font-weight: 900;
      color: #000;
      text-shadow: 0 0 15px #fff;
      letter-spacing: 2px;
    }

    .container {
      background: rgba(10, 10, 25, 0.95);
      padding: 35px;
      border-radius: 20px;
      width: 90%;
      max-width: 420px;
      border: 2px solid #00ffff;
      box-shadow: 0 0 25px #ff00ff, 0 0 60px #00ffff;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      text-align: center;
      color: #00ffff;
      margin-bottom: 20px;
      text-shadow: 0 0 10px #00ffff;
    }

    label {
      font-size: 14px;
      color: #ff00ff;
    }

    input, select {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #111133;
      color: #fff;
      font-size: 15px;
      transition: 0.3s;
    }

    input:focus, select:focus {
      border: 2px solid #00ffff;
      box-shadow: 0 0 12px #00ffff;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      background: linear-gradient(90deg, #ff00ff, #00ffff);
      box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff;
      transition: 0.3s;
      animation: pulse 2s infinite;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff; }
      50% { box-shadow: 0 0 25px #ff00ff, 0 0 45px #00ffff; }
      100% { box-shadow: 0 0 15px #ff00ff, 0 0 25px #00ffff; }
    }

    button:hover {
      transform: scale(1.05);
    }

    .message {
      text-align: center;
      font-weight: bold;
      margin-top: 10px;
      min-height: 25px;
      transition: 0.3s;
    }

    .success {
      color: #00ffcc;
      text-shadow: 0 0 10px #00ffcc;
      animation: pop 0.6s ease-in-out;
    }

    .error {
      color: #ff4d4d;
      text-shadow: 0 0 10px #ff4d4d;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .link {
      text-align: center;
      margin-top: 15px;
    }

    .link a {
      color: #ff00ff;
      text-decoration: none;
      font-weight: bold;
    }

    .link a:hover {
      color: #00ffff;
    }
  </style>
</head>

<body>

  <div class="banner">ZETA STORE</div>

  <div class="container">
    <h2>Crear Cuenta</h2>

    <form id="registerForm">
      <label>Nombre de Usuario</label>
      <input type="text" id="username" required>

      <label>Correo Electrónico</label>
      <input type="email" id="email" required>

      <label>WhatsApp</label>
      <select id="countryCode">
        <option value="+1">USA +1</option>
        <option value="+34">España +34</option>
        <option value="+52">México +52</option>
      </select>
      <input type="tel" id="phone" required>

      <label>Contraseña</label>
      <input type="password" id="password" required>

      <label>Confirmar Contraseña</label>
      <input type="password" id="confirmPassword" required>

      <label><input type="checkbox" required> Acepto Términos</label>

      <button type="submit" id="submitBtn">Crear Cuenta</button>
      <p id="errorMsg" class="message"></p>
    </form>

    <div class="link">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </div>
  </div>

  <script type="module">
  import { auth, db } from "./firebase.js";
  import { 
    createUserWithEmailAndPassword,
    sendEmailVerification,
    deleteUser
  } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

  import { 
    doc, 
    setDoc, 
    getDoc 
  } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore.js";

  const form = document.getElementById('registerForm');
  const errorMsg = document.getElementById('errorMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    submitBtn.disabled = true;
    submitBtn.textContent = "Procesando...";

    const username = document.getElementById('username').value.trim().toLowerCase();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const countryCode = document.getElementById('countryCode').value;
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    // 🔐 Validaciones básicas
    if (password !== confirmPassword) {
      return showError("⚔️ Las contraseñas no coinciden.");
    }

    if (password.length < 6) {
      return showError("🔐 La contraseña debe tener mínimo 6 caracteres.");
    }

    if (username.length < 3) {
      return showError("👤 El usuario debe tener al menos 3 caracteres.");
    }

    try {

      // 🔎 Verificar username único usando colección especial
      const usernameRef = doc(db, "usernames", username);
      const usernameSnap = await getDoc(usernameRef);

      if (usernameSnap.exists()) {
        return showError("⚡ Ese nombre de usuario ya está en uso.");
      }

      // 👤 Crear usuario en Auth
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      try {

        // 💾 Guardar username como reservado
        await setDoc(usernameRef, {
          uid: user.uid
        });

        // 💾 Guardar datos del usuario
        await setDoc(doc(db, "usuarios", user.uid), {
          username,
          email,
          phone: countryCode + phone,
          createdAt: new Date(),
          role: "user"
        });

      } catch (firestoreError) {

        // ❌ Si falla Firestore, eliminar usuario de Auth
        await deleteUser(user);
        console.error("Firestore error:", firestoreError);
        return showError("🚨 Error guardando datos. Intenta nuevamente.");
      }

      // 📧 Enviar verificación
      await sendEmailVerification(user);

      errorMsg.textContent = "📧 Revisa tu correo para verificar tu cuenta.";
      errorMsg.className = "message success";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 3000);

    } catch (error) {

      console.error("Auth error:", error);

      if (error.code === "auth/email-already-in-use") {
        showError("⚡ Ese correo ya pertenece a otro gamer.");
      } else if (error.code === "auth/invalid-email") {
        showError("❌ Correo inválido.");
      } else if (error.code === "auth/weak-password") {
        showError("🔐 Contraseña demasiado débil.");
      } else {
        showError("🚨 " + error.message);
      }
    }
  });

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.className = "message error";
    submitBtn.disabled = false;
    submitBtn.textContent = "Crear Cuenta";
  }

</script>

</body>
</html>
